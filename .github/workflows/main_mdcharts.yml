# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - MDCharts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build --if-present

      - name: Prune dev dependencies for deployment
        # Only needed for deploy — skip on PR builds to save time
        if: github.event_name != 'pull_request'
        run: npm prune --omit=dev

      - name: Upload artifact for deployment job
        # Only upload on push to main or manual trigger — not on PRs
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Only ship what Azure needs: built output + production node_modules
          # Cuts artifact from ~938 MB to ~150 MB, deploy time from 25min to ~5min
          path: |
            dist/
            node_modules/
            package.json
            package-lock.json
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on push to main or manual trigger — never on PRs
    # This prevents two simultaneous deploys (409 Conflict) when a PR is merged
    if: github.event_name != 'pull_request'

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'MDCharts'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_AC37F023CE154C8AAA9F851D7CC9211B }}
